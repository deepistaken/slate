services:
  - type: web
    name: slate
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:node
    startCommand: node .output/server/index.mjs
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Secrets — set the values in the Render dashboard (sync:false = not in repo)
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
